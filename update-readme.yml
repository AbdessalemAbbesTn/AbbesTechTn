name: تحديث قائمة التقارير

on:
  push:
    paths:
      - 'reports/*.md'

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: تشغيل السكريبت
        run: python update_readme.py
      - name: دفع التغيير
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add README.md
          git diff --quiet && git diff --staged --quiet || git commit -m "تحديث تلقائي لقائمة التقارير"
          git push
